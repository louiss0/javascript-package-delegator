# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
project_name: javascript-package-delegator

builds:
  - main: ./main.go
    id: jpd
    binary: jpd
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X {{ .ModulePath }}/build_info.rawCLI_VERSION={{ .Version }}
      - -X {{ .ModulePath }}/build_info.rawGO_MODE=production
      - -X {{ .ModulePath }}/build_info.rawBUILD_DATE={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^style(\(.*\))?:'
      - '^refactor(\(.*\))?:'
      - "^Merge"
      - '^(build|ci)\(deps'
      - '^(build|ci)\(.*\): bump'
  groups:
    - title: "Features"
      regexp: '^feat(\(.*\))?:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.*\))?:'
      order: 1
    - title: "Tests"
      regexp: '^test(\(.*\))?:'
      order: 2
    - title: "Performance"
      regexp: '^perf(\(.*\))?:'
      order: 3
    - title: "CI/Build"
      regexp: '^(build|ci)(\(.*\))?:'
      order: 4
    - title: "Others"
      order: 999
  sort: asc

release:
  github:
    owner: louiss0
    name: javascript-package-delegator

winget:
  - name: javascript-package-delegator
    publisher: the-code-fixer-23
    short_description: "A CLI for executing JavaScript package manager commands based on lock files. Supports npm, yarn, pnpm, bun, and deno."
    homepage: "https://github.com/louiss0/javascript-package-delegator"
    path: "manifests/t/the-code-fixer-23/javascript-package-delegator/{{ .Version }}"
    license: MIT
    publisher_url: https://github.com/louiss0
    publisher_support_url: "https://github.com/louiss0/javascript-package-delegator/issues/new"
    package_identifier: the-code-fixer-23.javascript-package-delegator
    commit_author:
      name: louis0
      email: louishelton0@gmail.com
    commit_msg_template: "{{ .PackageIdentifier }}: {{ .Tag }}"
    release_notes: "{{.Changelog}}"
    tags:
      - pnpm
      - package-manager
      - yarn
      - npm
      - deno
      - bun
    repository:
      owner: Sheltons-CLI-Projects
      name: winget-pkgs
      branch: "{{ .ProjectName }}-{{ .Version }}"
      git:
        url: git@github.com:Sheltons-CLI-Projects/winget-pkgs.git
        private_key: "{{ .Env.GORELEASER_WINGET_DEPLOY_KEY_PATH }}"

homebrew_casks:
  - name: javascript-package-delegator
    binaries:
      - jpd
    commit_author:
      name: louiss0
      email: louishelton0@gmail.com
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/louiss0/javascript-package-delegator"
    description: "A CLI for executing JavaScript package manager commands based on lock files. Supports npm, yarn, pnpm, bun, and deno."
    repository:
      owner: Sheltons-CLI-Projects
      name: homebrew-the-code-fixer-23
      branch: main
      git:
        url: git@github.com:Sheltons-CLI-Projects/homebrew-the-code-fixer-23.git
        private_key: "{{ .Env.GORELEASER_HOMEBREW_DEPLOY_KEY_PATH }}"

scoops:
  - name: javascript-package-delegator
    commit_author:
      name: louiss0
      email: louishelton0@gmail.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    goamd64: v3
    homepage: "https://github.com/louiss0/javascript-package-delegator"
    directory: bucket
    license: MIT
    description: "A CLI for executing JavaScript package manager commands based on lock files. Supports npm, yarn, pnpm, bun, and deno."
    repository:
      owner: louiss0
      name: the-code-fixer-23-buckets
      branch: main
      git:
        url: git@github.com:louiss0/the-code-fixer-23-buckets.git
        private_key: "{{ .Env.SCOOP_PRIVATE_KEY_PATH }}"

nix:
  - name: javascript-package-delegator
    goamd64: v1
    commit_author:
      name: louiss0
      email: louishelton0@gmail.com
    commit_msg_template: "{{ .ProjectName }}: {{ .Tag }}"
    path: "pkgs/{{ .ProjectName }}/default.nix"
    homepage: "https://github.com/louiss0/javascript-package-delegator"
    description: "A CLI for executing JavaScript package manager commands based on lock files. Supports npm, yarn, pnpm, bun, and deno."
    license: "mit"
    repository:
      owner: Sheltons-CLI-Projects
      name: the-code-fixer-23-nur
      branch: main
      git:
        url: "git@github.com:Sheltons-CLI-Projects/the-code-fixer-23-nur.git"
        private_key: "{{ .Env.GORELEASER_NIX_DEPLOY_KEY_PATH }}"
